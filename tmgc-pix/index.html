    <title>Tmgc Pix вңҰ Fav Guide</title>

<body>
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="app-header glass">
        <div class="header-content">
            <div class="title-container">
                <img src="../assets/logo_tmgchile.png" alt="Logo Tamagotchi" class="logo">
                <h1 id="app-title">GuГӯa Tamagotchi Pix</h1>
            </div>

            <div class="controls">
                <!-- Device Toggle -->
                <div class="toggle-container" id="device-toggle-container">
                    <button class="toggle-btn active" data-version="pix" id="btn-pix">Pix</button>
                    <button class="toggle-btn" data-version="party" id="btn-party">Pix Party</button>
                </div>
                <!-- Language Toggle -->
                <div class="lang-toggle-container" id="lang-toggle-container">
                    <button class="lang-btn active" data-lang="es">ES</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="app-content">
        <!-- Group Filter -->
        <section class="filters-section">
            <select id="group-select" class="glass-input">
                <option value="all" id="opt-all-groups">Todos los Grupos</option>
                <!-- Dynamically populated -->
            </select>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar personaje..." class="glass-input">
            </div>
        </section>

        <!-- Characters Grid -->
        <section id="character-grid" class="grid-container">
            <!-- Dynamically populated -->
        </section>
    </main>

    <!-- Character Details Modal -->
    <div id="character-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content glass-modal">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-body" id="modal-body-content">
                <!-- Dynamically populated details -->
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="footer-inner">

            <div class="footer-left">
                <img src="../assets/tamagotchile.PNG" class="footer-logo">
            </div>

            <div class="footer-center">
                <span>Fan guide вҖ” not affiliated with Bandai</span>
            </div>

            <div class="footer-right">
                <span>Made with вҷЎ by emagotchi</span>
                <span class="separator">вҖў</span>
                <span>В© 2026</span>
            </div>

        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    
</body>
